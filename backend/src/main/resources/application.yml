spring:
  application:
    name: securechat
  datasource:
    url: jdbc:postgresql://localhost:5432/securechat
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:change-me-to-a-secure-random-string-at-least-256-bits-long-for-dev-only}
  expiration: 86400000

server:
  port: 8080

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173}
